name: Build and Push RAG API

on:
  push:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run syntax check
        run: python -m py_compile guardrails.py

      - name: Build Docker image
        run: docker build -t rag-api .

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin

      - name: Tag Docker image
        run: docker tag rag-api ${{ secrets.DOCKER_USERNAME }}/rag-api:latest

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/rag-api:latest
